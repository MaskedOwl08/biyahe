<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weather Map - Biyaheng Pantalan</title>
<style>
  :root{
    --deep:#083344; --board:#0B4258; --foam:#EAF6F6;
    --amber:#FFB454; --line:#1B5A72;
  }
  *{box-sizing:border-box;margin:0}
  html, body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--deep); color:var(--foam);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:12px;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    background:var(--board); border-bottom:1px solid var(--line);
  }
  header a{
    color:var(--amber); text-decoration:none; font-size:15px; font-weight:700;
  }
  header h1{font-size:17px; font-weight:800}
  .map-wrap{flex:1; position:relative; min-height:0}
  iframe{width:100%; height:100%; border:0; display:block}
  .offline-msg{
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; height:100%; padding:32px 24px; text-align:center;
  }
  .offline-msg.show{display:flex}
  .offline-msg .icon{font-size:44px}
  .offline-msg h2{font-size:17px; font-weight:800}
  .offline-msg p{font-size:13.5px; color:#9CCADB; line-height:1.5; max-width:320px}
  .offline-msg a{
    margin-top:6px; padding:11px 20px; border-radius:10px;
    background:var(--amber); color:var(--deep); text-decoration:none;
    font-weight:800; font-size:14px;
  }
  .note{
    font-size:12px; color:#8FBECF; text-align:center;
    padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
    background:var(--board);
  }
</style>
</head>
<body>

<header>
  <a href="index.html">&larr; Back</a>
  <h1>🗺️ Weather Map</h1>
</header>

<div class="map-wrap">
  <iframe id="wxFrame"
    src="https://embed.windy.com/embed2.html?lat=10.85&lon=121.02&zoom=8&level=surface&overlay=wind&product=ecmwf&menu=true&message=true&marker=false&calendar=now&pressure=false&type=map&location=coordinates&detail=false&metricWind=default&metricTemp=default"
    frameborder="0" loading="lazy">
  </iframe>
  <div class="offline-msg" id="offlineMsg">
    <div class="icon">📡</div>
    <h2>Weather map needs internet</h2>
    <p>This interactive map loads live from the web, so it's not available offline. Your last saved forecast is still on the main screen.</p>
    <a href="index.html">← Back to schedule &amp; forecast</a>
  </div>
</div>

<div class="note">
  Tap the layers icon on the map to switch between wind, rain, waves, and clouds.
</div>

<script>
  function checkOnlineState(){
    const frame = document.getElementById('wxFrame');
    const msg = document.getElementById('offlineMsg');
    if (!navigator.onLine){
      frame.style.display = 'none';
      msg.classList.add('show');
    } else {
      frame.style.display = 'block';
      msg.classList.remove('show');
    }
  }
  checkOnlineState();
  window.addEventListener('online', checkOnlineState);
  window.addEventListener('offline', checkOnlineState);
</script>

</body>
</html>
